<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料壁打ちお申し込み | 外部CHROパートナー</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>

<body class="bg-light">

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M6LGHPBP" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <a href="v2.html" style="text-decoration: none;">
                    <span class="logo-text">Nagare</span>
                    <span class="logo-sub">外部CHROパートナー</span>
                </a>
            </div>
            <nav class="nav">
                <a href="v2.html">トップページへ戻る</a>
            </nav>
            <a href="v2.html" class="btn-primary header-btn"
                style="background: var(--clr-gray); color: var(--clr-navy); box-shadow: none;">戻る</a>
        </div>
    </header>

    <div style="padding-top: 120px;"></div>

    <section class="section" style="padding-top: 2rem; padding-bottom: 6rem;">
        <div class="container container-narrow">
            <div class="contact-card">
                <h2 class="section-title text-center"
                    style="font-size: 1.8rem; margin-bottom: 0.5rem; border: none; padding-bottom: 0;">無料で壁打ちを申し込む</h2>
                <div class="text-center" style="margin-bottom: 2rem;">
                    <p style="color: var(--clr-text-light); line-height: 1.6;">
                        必要事項をご入力の上、送信ボタンを押してください。<br>（60分の「無料壁打ち」にて、頭の中にある組織課題の棚卸しや、思考の整理をサポートします）</p>
                </div>

                <form action="https://formspree.io/f/mdapqkeg" method="POST" class="contact-form">
                    <input type="hidden" name="_next" value="https://externalchro.vercel.app/thanks">
                    <input type="hidden" name="page_variant" value="v2">
                    <div class="form-group">
                        <label class="form-label">貴社名 <span class="form-badge badge-req">必須</span></label>
                        <input type="text" name="company" class="form-control" required placeholder="株式会社Nagare">
                    </div>

                    <div class="form-group">
                        <label class="form-label">お名前 <span class="form-badge badge-req">必須</span></label>
                        <input type="text" name="name" class="form-control" required placeholder="山田 太郎">
                    </div>

                    <div class="form-group">
                        <label class="form-label">役職 <span class="form-badge badge-req">必須</span></label>
                        <input type="text" name="position" class="form-control" required placeholder="代表取締役">
                    </div>

                    <div class="form-group">
                        <label class="form-label">メールアドレス <span class="form-badge badge-req">必須</span></label>
                        <input type="email" name="email" class="form-control" required placeholder="info@example.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label">メールアドレス（確認用） <span class="form-badge badge-req">必須</span></label>
                        <input type="email" name="email_confirm" class="form-control" required
                            placeholder="info@example.com">
                    </div>

                    <div class="form-group" style="margin-bottom: 2.5rem;">
                        <label class="form-label">お電話番号 <span class="form-badge badge-opt">任意</span></label>
                        <input type="tel" name="phone" class="form-control" placeholder="03-1234-5678">
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn-primary btn-xl"
                            style="width: 100%; border: none; cursor: pointer; max-width: 400px;">
                            送信する
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer Bottom only -->
    <div style="background: var(--clr-navy);">
        <div class="footer-bottom">
            <div class="container footer-bottom-inner"
                style="flex-direction: column; align-items: center; justify-content: center; gap: 1rem; border: none;">
                <p class="copyright-text" style="color: rgba(255,255,255,0.7);">&copy; 2026 Nagare Inc. All rights
                    reserved.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
